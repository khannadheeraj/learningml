<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- SEO -->
    <meta name="robots" content="index, follow" />

    <meta
      name="description"
      content="WhatsApp Campaign Platform for bulk messaging, customer engagement, automated campaigns, analytics, and business communication."
    />

    <meta
      name="keywords"
      content="WhatsApp Campaign, WhatsApp Marketing, Bulk WhatsApp Messaging, WhatsApp Automation, WhatsApp Business API, Campaign Management"
    />

    <meta name="author" content="Your Company Name" />

    <!-- Mobile Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Title -->
    <title>WhatsApp Campaign Manager</title>

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="/assets/images/wa-campaign-logo.png"
    />

    <!-- Apple Touch Icon -->
    <link
      rel="apple-touch-icon"
      sizes="256x256"
      href="/assets/images/wa-campaign-logo.png"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="WhatsApp Campaign Manager" />

    <meta
      property="og:description"
      content="Run WhatsApp marketing campaigns, manage contacts, automate messages, and track campaign performance."
    />

    <meta property="og:type" content="website" />

    <!-- Updated OG Image -->
    <meta
      property="og:image"
      content="https://chatgpt.com/s/m_6a1711fc531081918469cf0153a13f14"
    />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="WhatsApp Campaign Manager" />

    <meta
      name="twitter:description"
      content="Professional WhatsApp marketing and campaign management platform."
    />

    <meta
      name="twitter:image"
      content="https://chatgpt.com/s/m_6a1711fc531081918469cf0153a13f14"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#25D366" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/style.min.css" />
    <link rel="stylesheet" href="/assets/css/main.min.css" />

    <!-- Logo Size Fix -->
    <style>
      .header-brand img,
      .sidebar-brand img,
      .app-logo {
        height: 60px !important;
        width: auto !important;
        object-fit: contain;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <!-- React Root -->
    <div id="root"></div>
  </body>
</html>
